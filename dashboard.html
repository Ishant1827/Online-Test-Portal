<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Online Test Portal</h1>
            <div class="user-info">
                <span id="studentName"></span>
                <button onclick="logout()" class="btn secondary small">Logout</button>
            </div>
        </header>
        
        <main>
            <h2>Welcome, <span id="welcomeName"></span></h2>
            <button onclick="showChangePassword()" class="btn secondary">Change Password</button>
            
            <h3>Available Tests</h3>
            <div id="testsList" class="tests-grid"></div>
        </main>
    </div>

    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <h3>Change Password</h3>
            <form id="changePasswordForm">
                <div class="form-group"><label>Current Password</label><input type="password" id="currentPass" required></div>
                <div class="form-group"><label>New Password</label><input type="password" id="newPass" minlength="6" required></div>
                <button type="submit" class="btn primary">Update</button>
                <button type="button" onclick="hideChangePasswordModal()" class="btn secondary">Cancel</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
