<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header><h1>📚 Online Test Portal</h1></header>
        
        <main class="auth-page">
            <div class="auth-card">
                <h2>Create Password</h2>
                <form id="createPasswordForm">
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="mobile" maxlength="10" required>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Domain</label>
                        <select id="domain" required>
                            <option value="">Select Domain</option>
                            <option value="Programming">Programming</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Design">Design</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" minlength="6" required>
                    </div>
                    <button type="submit" class="btn primary full-width">Create Password</button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script src="create-password.js"></script>
</body>
</html>
